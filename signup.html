<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNUP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600&family=VT323&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'VT323', monospace;
            background: #0a0a0f;
            color: #00f0ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(rgba(0, 240, 255, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.035) 1px, transparent 1px);
            background-size: 45px 45px;
            animation: gridMove 30s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 90px 90px; }
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(57, 255, 20, 0.04) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            animation: scan 6s linear infinite;
            z-index: 1;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(400%); }
        }

        .login-card {
            background: rgba(15, 15, 28, 0.96);
            width: 100%;
            max-width: 420px;
            padding: 50px 45px;
            border: 3px solid #00f0ff;
            box-shadow: 
                0 0 40px rgba(0, 240, 255, 0.7),
                inset 0 0 30px rgba(255, 0, 255, 0.2);
            position: relative;
            z-index: 2;
        }

        .header {
            text-align: center;
            margin-bottom: 45px;
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            font-weight: 600;
            background: linear-gradient(90deg, #ff00ff, #00f0ff, #39ff14);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 
                0 0 15px #ff00ff,
                0 0 30px #00f0ff;
            margin-bottom: 8px;
            letter-spacing: 3px;
        }

        .header p {
            color: #39ff14;
            font-size: 1.25rem;
            text-shadow: 0 0 10px #39ff14;
        }

        .form-group {
            margin-bottom: 28px;
        }

        label {
            display: block;
            color: #39ff14;
            font-size: 1.25rem;
            margin-bottom: 10px;
            text-shadow: 0 0 8px #39ff14;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: #0f0f1a;
            border: 2px solid #00f0ff;
            color: #ffffff;
            font-family: 'VT323', monospace;
            font-size: 1.35rem;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        input:focus {
            border-color: #ff00ff;
            box-shadow: 
                0 0 25px #ff00ff,
                0 0 35px rgba(255, 0, 255, 0.6);
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 55px;
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, #ff00ff, #00f0ff);
            color: #000;
            border: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 0 30px #00f0ff;
            transition: all 0.4s ease;
        }

        button:hover {
            background: linear-gradient(90deg, #00f0ff, #ff00ff);
            box-shadow: 
                0 0 40px #ff00ff,
                0 0 60px #00f0ff;
            transform: scale(1.04);
        }

        .footer {
            text-align: center;
            margin-top: 35px;
            font-size: 1.1rem;
            color: rgba(57, 255, 20, 0.7);
        }

        .footer a {
            color: #ff00ff;
            text-decoration: none;
        }

        .footer a:hover {
            text-shadow: 0 0 12px #ff00ff;
        }
    </style>
</head>
<body>

    <div class="scanline"></div>

    <div class="login-card">
        <div class="header">
            <h1>CREATE FREE ACCOUNT</h1>

        </div>

        <form method="post" action="signup.php">
            <div class="form-group">

            </div>

            </div>

            <div class="form-group password-wrapper">
                <label for="password">TOKEN // PASSWORD</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit">CONNECT TO THE GRID</button>
        </form>

        <div class="footer">
            ALEADY HAVE? <a href="login.html">RUNN AGAIN</a>
        </div>
    </div>
